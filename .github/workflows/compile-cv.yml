name: Compile CV

on:
  push:
    paths:
      - '**.tex'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Push PDF to website repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git clone https://x-access-token:${{ secrets.PAGES_TOKEN }}@github.com/arradiat/arradiat.github.io.git website
          cp main.pdf website/Mame_resume.pdf
          cd website
          git add Mame_resume.pdf
          git diff --cached --quiet || git commit -m "Update CV PDF"
          git push
