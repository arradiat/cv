name: Compile CV

on:
  push:
    paths:
      - '**.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add main.pdf
          git diff --cached --quiet || git commit -m "Auto-compile CV PDF"
          git push
